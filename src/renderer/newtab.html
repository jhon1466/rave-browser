<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Nueva pestaña — Rave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ─────────────────────────────────── */
    :root {
      --font: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
      --bg: #fafafa;
      --bg2: #f1f1f3;
      --glass: rgba(255,255,255,0.72);
      --glass-b: rgba(255,255,255,0.5);
      --border: rgba(0,0,0,0.08);
      --ink: #1d1d1f;
      --soft: #6e6e73;
      --xsoft: #aeaeb2;
      --accent: #1d1d1f;
      --pill-bg: rgba(255,255,255,0.85);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e10;
        --bg2: #18181c;
        --glass: rgba(26,26,30,0.78);
        --glass-b: rgba(40,40,46,0.60);
        --border: rgba(255,255,255,0.07);
        --ink: #f5f5f7;
        --soft: #98989d;
        --xsoft: #636366;
        --pill-bg: rgba(30,30,34,0.90);
      }
    }
    /* Manual themes passed via <html data-theme> */
    html[data-theme="light"] {
      --bg:#fafafa; --bg2:#f1f1f3;
      --glass:rgba(255,255,255,0.72); --glass-b:rgba(255,255,255,0.5);
      --border:rgba(0,0,0,0.08); --ink:#1d1d1f; --soft:#6e6e73; --xsoft:#aeaeb2;
      --pill-bg:rgba(255,255,255,0.85);
    }
    html[data-theme="dark"] {
      --bg:#0e0e10; --bg2:#18181c;
      --glass:rgba(26,26,30,0.78); --glass-b:rgba(40,40,46,0.60);
      --border:rgba(255,255,255,0.07); --ink:#f5f5f7; --soft:#98989d; --xsoft:#636366;
      --pill-bg:rgba(30,30,34,0.90);
    }
    html[data-theme="eclipse"] {
      --font:'Bahnschrift','Oxanium',-apple-system,'Segoe UI',system-ui,sans-serif;
      --bg:#0a0d10; --bg2:#11161b;
      --glass:rgba(17,22,27,0.55); --glass-b:rgba(255,122,26,0.10);
      --border:rgba(255,122,26,0.22); --ink:#e8eaed; --soft:#8b9298; --xsoft:#5c636a;
      --accent:#ff7a1a; --pill-bg:rgba(17,22,27,0.72);
    }
    html[data-theme="eclipse"] #time { letter-spacing: -1px; text-transform: uppercase; }
    html[data-theme="eclipse"] #search-submit { background: var(--accent); color: #0a0c0f; }
    html[data-theme="eclipse"] #q:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,122,26,0.18), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background grid pattern ───────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 30% 20%, color-mix(in srgb, var(--ink) 3%, transparent) 0%, transparent 55%),
        radial-gradient(circle at 80% 80%, color-mix(in srgb, var(--ink) 2%, transparent) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    /* ── Page layout ───────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      min-height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px 80px;
      gap: 0;
    }

    /* ── Logo ──────────────────────────────────────── */
    #brand { margin-bottom: 22px; text-align: center; }
    #brand img {
      width: 72px; height: 72px;
      border-radius: 50%;
      box-shadow: 0 6px 24px rgba(0,0,0,0.14);
    }

    /* ── Clock ─────────────────────────────────────── */
    #clock-wrap { text-align: center; margin-bottom: 10px; }
    #time {
      font-size: clamp(56px, 12vw, 88px);
      font-weight: 700;
      letter-spacing: -3px;
      color: var(--ink);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }
    #date {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 400;
      color: var(--soft);
      letter-spacing: 0.01em;
    }

    /* ── Search bar ────────────────────────────────── */
    #search-wrap { width: min(640px, 92vw); margin-top: 36px; }
    #search-form { position: relative; display: flex; }
    #search-icon {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; display: grid; place-items: center;
      color: var(--soft); pointer-events: none; z-index: 1;
    }
    #search-icon svg { width: 18px; height: 18px; }
    #q {
      width: 100%; height: 56px;
      padding: 0 56px 0 50px;
      background: var(--pill-bg);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      color: var(--ink);
      font-size: 16px; font-family: var(--font); font-weight: 400;
      letter-spacing: -0.02em;
      outline: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 120ms ease;
    }
    #q:focus {
      border-color: var(--accent);
      box-shadow:
        0 0 0 3.5px color-mix(in srgb, var(--accent) 10%, transparent),
        0 8px 32px rgba(0,0,0,0.08);
      transform: scaleY(1.02);
    }
    #q::placeholder { color: var(--xsoft); }
    #search-submit {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 999px;
      border: none; background: var(--ink); color: var(--bg);
      display: grid; place-items: center; cursor: pointer;
      transition: opacity 140ms, transform 120ms cubic-bezier(0.34,1.4,0.64,1);
    }
    #search-submit:hover { opacity: 0.88; transform: translateY(-50%) scale(1.08); }
    #search-submit svg { width: 16px; height: 16px; }

    /* ── Quick access sites ────────────────────────── */
    #sites-wrap { margin-top: 40px; width: min(640px, 92vw); }
    #sites-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--xsoft);
      margin-bottom: 14px; padding-left: 4px;
    }
    #sites {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .site {
      position: relative;
      display: flex; flex-direction: column; align-items: center; gap: 9px;
      padding: 16px 10px 14px;
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border: 1px solid var(--border);
      border-radius: 18px;
      cursor: pointer;
      text-decoration: none; color: var(--ink);
      box-shadow: 0 2px 12px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.04);
      transition: background 160ms ease, transform 150ms cubic-bezier(0.34,1.4,0.64,1), box-shadow 160ms ease;
    }
    .site:hover {
      background: var(--glass-b);
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 28px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
    }
    .site:active { transform: translateY(0) scale(0.97); }
    .site .ico {
      width: 48px; height: 48px;
      display: grid; place-items: center;
      background: color-mix(in srgb, var(--ink) 5%, transparent);
      border-radius: 14px; overflow: hidden;
      transition: background 160ms;
    }
    .site:hover .ico { background: color-mix(in srgb, var(--ink) 8%, transparent); }
    .site .ico img { width: 28px; height: 28px; object-fit: contain; }
    .site .ico .fallback {
      font-size: 22px; font-weight: 700;
      color: var(--soft);
      line-height: 1;
    }
    .site .name {
      font-size: 11.5px; font-weight: 500;
      max-width: 100%; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--soft);
    }
    #sites:empty + #sites-wrap { display: none; }

    /* ── Empty state ───────────────────────────────── */
    #sites:empty { display: none; }

    /* ── Shield badge ──────────────────────────────── */
    #shield-badge {
      position: fixed; bottom: 22px; right: 22px;
      display: none;
      align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px; font-weight: 500; color: var(--soft);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      animation: badge-in 400ms cubic-bezier(0.34,1.4,0.64,1) both;
    }
    #shield-badge.visible { display: flex; }
    @keyframes badge-in { from { opacity: 0; transform: translateY(10px) scale(0.92); } }
    #shield-badge svg { width: 14px; height: 14px; color: var(--ink); }
    #shield-count-nt { font-weight: 700; color: var(--ink); }

    /* ── Custom Background overrides ────────────────── */
    body.has-custom-bg {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      --ink: #ffffff;
      --soft: #e5e5ea;
      --xsoft: #a1a1aa;
      --border: rgba(255, 255, 255, 0.15);
      --glass: rgba(0, 0, 0, 0.45);
      --glass-b: rgba(0, 0, 0, 0.6);
      --pill-bg: rgba(255, 255, 255, 0.12);
    }
    body.has-custom-bg::before {
      background-image: none;
      background-color: rgba(0, 0, 0, 0.42);
    }
    body.has-custom-bg #search-submit {
      background: #ffffff;
      color: #0c0c0e;
    }
    /* El vídeo va en una capa POSICIONADA (z-index:0) para quedar por encima
       del fondo opaco del body; si no, el body lo tapaba y se veía negro. */
    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
      pointer-events: none;
    }
    body.has-video-bg #bg-video { display: block; }
    /* Capa de oscurecido SOBRE el vídeo (legibilidad), bajo el contenido. */
    #bg-tint {
      position: fixed; inset: 0;
      z-index: 0;
      background: rgba(0, 0, 0, 0.42);
      display: none;
      pointer-events: none;
    }
    body.has-video-bg #bg-tint { display: block; }

    /* ── Customize button & menu ───────────────────── */
    #customize-btn {
      position: fixed; bottom: 22px; left: 22px;
      width: 36px; height: 36px; border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--soft);
      display: grid; place-items: center; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      transition: background 160ms, transform 160ms, color 160ms;
      z-index: 11;
    }
    #customize-btn:hover {
      background: var(--glass-b);
      color: var(--ink);
      transform: scale(1.08);
    }
    #customize-btn svg { width: 18px; height: 18px; }

    #customize-menu {
      position: fixed; bottom: 70px; left: 22px;
      width: 260px;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
      display: flex; flex-direction: column; gap: 12px;
      opacity: 0; transform: translateY(10px) scale(0.95);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
    }
    #customize-menu.open {
      opacity: 1; transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .customize-title {
      font-size: 13px; font-weight: 600; color: var(--ink);
      letter-spacing: -0.01em; margin-bottom: 2px;
    }
    .customize-desc {
      font-size: 11px; color: var(--soft);
      line-height: 1.4; margin-bottom: 6px;
    }
    .customize-btn-action {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 36px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--pill-bg);
      color: var(--ink);
      font-size: 12px; font-weight: 500; font-family: var(--font);
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }
    .customize-btn-action:hover {
      background: color-mix(in srgb, var(--ink) 5%, var(--pill-bg));
      border-color: var(--soft);
    }
    .customize-btn-action svg { width: 14px; height: 14px; }
    
    .customize-btn-danger {
      color: #ff453a;
      border-color: rgba(255, 69, 58, 0.2);
    }
    .customize-btn-danger:hover {
      background: rgba(255, 69, 58, 0.1);
      border-color: rgba(255, 69, 58, 0.4);
    }

    /* ── Custom Shortcuts ────────────────────────── */
    .site-actions {
      position: absolute;
      top: 8px; right: 8px;
      display: flex; gap: 4px;
      opacity: 0;
      transition: opacity 150ms ease;
      z-index: 5;
    }
    .site:hover .site-actions {
      opacity: 1;
    }
    .site-action-btn {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: none;
      background: var(--glass-b);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--ink);
      display: grid; place-items: center;
      cursor: pointer;
      transition: background 150ms, transform 120ms;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .site-action-btn:hover {
      background: var(--ink);
      color: var(--bg);
      transform: scale(1.1);
    }
    .site-action-btn svg { width: 12px; height: 12px; }

    /* Modal dialog */
    #shortcut-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none; place-items: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 20;
      opacity: 0; transition: opacity 200ms ease;
    }
    #shortcut-modal.visible {
      display: grid;
      opacity: 1;
    }
    .modal-card {
      width: min(340px, 90vw);
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
      display: flex; flex-direction: column; gap: 16px;
      transform: scale(0.92); transition: transform 200ms ease;
    }
    #shortcut-modal.visible .modal-card {
      transform: scale(1);
    }
    .modal-title {
      font-size: 15px; font-weight: 600; color: var(--ink);
    }
    .modal-input-group {
      display: flex; flex-direction: column; gap: 6px;
    }
    .modal-input-group label {
      font-size: 11px; font-weight: 500; color: var(--soft);
    }
    .modal-input {
      height: 38px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--pill-bg);
      color: var(--ink);
      padding: 0 12px; font-size: 13px; font-family: var(--font);
      outline: none;
      transition: border-color 150ms;
    }
    .modal-input:focus {
      border-color: var(--ink);
    }
    .modal-actions {
      display: flex; justify-content: flex-end; gap: 10px;
      margin-top: 4px;
    }
    .modal-btn {
      height: 34px; padding: 0 14px; border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 12px; font-weight: 500; font-family: var(--font);
      cursor: pointer; transition: background 150ms;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-btn.primary {
      background: var(--ink);
      color: var(--bg);
      border: none;
    }
    .modal-btn.primary:hover {
      opacity: 0.9;
    }
    .modal-btn.ghost {
      background: transparent;
      color: var(--soft);
    }
    .modal-btn.ghost:hover {
      background: color-mix(in srgb, var(--ink) 4%, transparent);
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 520px) {
      #sites { grid-template-columns: repeat(3, 1fr); }
      #time { letter-spacing: -2px; }
    }
    @media (max-width: 360px) {
      #sites { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <video id="bg-video" autoplay loop muted playsinline></video>
  <div id="bg-tint"></div>
  <div class="page">
    <!-- Logo -->
    <div id="brand"><img src="assets/logo.png" alt="Rave" /></div>

    <!-- Clock & Date -->
    <div id="clock-wrap">
      <div id="time">00:00</div>
      <div id="date"></div>
    </div>

    <!-- Search bar -->
    <div id="search-wrap">
      <form id="search-form">
        <span id="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input id="q" autocomplete="off" spellcheck="false"
               placeholder="Busca en la web o escribe una dirección…" autofocus />
        <button type="submit" id="search-submit" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>
    </div>

    <!-- Top sites -->
    <div id="sites-wrap">
      <div id="sites-label">Accesos rápidos</div>
      <div id="sites"></div>
    </div>
  </div>

  <!-- Shield stats badge (shown when blocks > 0) -->
  <div id="shield-badge">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/>
    </svg>
    <span>Bloqueados hoy:</span>
    <span id="shield-count-nt">0</span>
  </div>

  <!-- Personalizar -->
  <button id="customize-btn" title="Personalizar fondo de pantalla">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </button>
  
  <div id="customize-menu">
    <div class="customize-title">Personalizar fondo</div>
    <div class="customize-desc">Sube una imagen (JPEG/PNG/GIF/WebP) o video (MP4/WebM) para el fondo.</div>
    <button class="customize-btn-action" id="btn-upload-bg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
      </svg>
      Subir archivo
    </button>
    <button class="customize-btn-action customize-btn-danger hidden" id="btn-remove-bg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>
      </svg>
      Quitar fondo
    </button>
    <input type="file" id="bg-input" accept="image/*,video/*" style="display: none" />
    
    <div class="sep" style="height: 1px; background: var(--border); margin: 6px 0;"></div>
    <div class="customize-title">Accesos rápidos</div>
    <button class="customize-btn-action" id="btn-reset-shortcuts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5"/>
      </svg>
      Restablecer atajos
    </button>
  </div>

  <!-- Modal para atajos -->
  <div id="shortcut-modal">
    <div class="modal-card">
      <div class="modal-title" id="modal-shortcut-title">Añadir atajo</div>
      <div class="modal-input-group">
        <label for="shortcut-name">Nombre</label>
        <input type="text" id="shortcut-name" class="modal-input" placeholder="Ej: Google" autocomplete="off" />
      </div>
      <div class="modal-input-group">
        <label for="shortcut-url">URL</label>
        <input type="text" id="shortcut-url" class="modal-input" placeholder="Ej: https://google.com" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button class="modal-btn ghost" id="btn-cancel-shortcut">Cancelar</button>
        <button class="modal-btn primary" id="btn-save-shortcut">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    /* ── Read URL params ─────────────────────────── */
    const params   = new URLSearchParams(location.search);
    const engine   = params.get('engine') || 'https://duckduckgo.com/?q=';
    const theme    = params.get('theme');
    const blocks   = parseInt(params.get('blocks') || '0', 10);

    if (theme) document.documentElement.setAttribute('data-theme', theme);

    /* ── Clock ───────────────────────────────────── */
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    const DAYS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    function tick() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      timeEl.textContent = `${h}:${m}`;
      dateEl.textContent = `${DAYS[now.getDay()]}, ${now.getDate()} de ${MONTHS[now.getMonth()]} de ${now.getFullYear()}`;
    }
    tick();
    // Sync to the next full minute, then tick every 60 s
    const msToNext = (60 - new Date().getSeconds()) * 1000 - new Date().getMilliseconds();
    setTimeout(() => { tick(); setInterval(tick, 60000); }, msToNext);

    /* ── Shield badge ────────────────────────────── */
    if (blocks > 0) {
      document.getElementById('shield-count-nt').textContent = blocks;
      document.getElementById('shield-badge').classList.add('visible');
    }

    /* ── Top sites ───────────────────────────────── */
    const grid = document.getElementById('sites');
    const wrap = document.getElementById('sites-wrap');

    function getSitesList() {
      const customSitesStr = localStorage.getItem('rave-custom-sites');
      if (customSitesStr) {
        try {
          return JSON.parse(customSitesStr);
        } catch (e) {
          return [];
        }
      }
      try {
        return JSON.parse(params.get('sites') || '[]');
      } catch (e) {
        return [];
      }
    }

    function renderSites() {
      const sitesList = getSitesList();
      grid.innerHTML = '';
      wrap.style.display = 'block';

      sitesList.forEach((s, idx) => {
        let host = '';
        try { host = new URL(s.url).hostname.replace(/^www\./, ''); } catch { return; }

        const letter = (s.title || host || '?').trim().charAt(0).toUpperCase();

        const a = document.createElement('a');
        a.className = 'site';
        a.href = s.url;
        a.title = s.url;

        // Action buttons container
        const actions = document.createElement('div');
        actions.className = 'site-actions';

        // Edit button
        const btnEdit = document.createElement('button');
        btnEdit.className = 'site-action-btn';
        btnEdit.title = 'Editar';
        btnEdit.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>`;
        btnEdit.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          openShortcutModal(idx);
        });

        // Delete button
        const btnDel = document.createElement('button');
        btnDel.className = 'site-action-btn';
        btnDel.title = 'Eliminar';
        btnDel.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>`;
        btnDel.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          deleteShortcut(idx);
        });

        actions.appendChild(btnEdit);
        actions.appendChild(btnDel);
        a.appendChild(actions);

        const ico = document.createElement('span');
        ico.className = 'ico';

        const img = document.createElement('img');
        img.alt = '';
        img.src = 'https://icons.duckduckgo.com/ip3/' + host + '.ico';
        img.addEventListener('error', () => {
          img.style.display = 'none';
          fallback.style.display = 'block';
        });

        const fallback = document.createElement('span');
        fallback.className = 'fallback';
        fallback.textContent = letter;
        fallback.style.display = 'none';

        ico.appendChild(img);
        ico.appendChild(fallback);

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = s.title || host;

        a.appendChild(ico);
        a.appendChild(name);
        grid.appendChild(a);
      });

      // Always show "+" shortcut button if less than 12 shortcuts
      if (sitesList.length < 12) {
        const addCard = document.createElement('div');
        addCard.className = 'site add-shortcut-btn';
        addCard.id = 'btn-add-shortcut';
        addCard.title = 'Añadir atajo';

        const ico = document.createElement('span');
        ico.className = 'ico';
        
        const fallback = document.createElement('span');
        fallback.className = 'fallback';
        fallback.textContent = '+';
        ico.appendChild(fallback);

        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = 'Añadir atajo';

        addCard.appendChild(ico);
        addCard.appendChild(name);
        
        addCard.addEventListener('click', () => {
          openShortcutModal(-1);
        });

        grid.appendChild(addCard);
      }
    }
    renderSites();

    /* ── Search form ─────────────────────────────── */
    document.getElementById('search-form').addEventListener('submit', e => {
      e.preventDefault();
      const t = document.getElementById('q').value.trim();
      if (!t) return;
      if (/^[a-z]+:\/\//i.test(t))            location.href = t;
      else if (/^[^\s]+\.[^\s]+$/.test(t) && !t.includes(' '))
                                               location.href = 'https://' + t;
      else                                     location.href = engine + encodeURIComponent(t);
    });

    /* ── Custom Background (IndexedDB) ─────────────── */
    const customizeBtn = document.getElementById('customize-btn');
    const customizeMenu = document.getElementById('customize-menu');
    const btnUploadBg = document.getElementById('btn-upload-bg');
    const btnRemoveBg = document.getElementById('btn-remove-bg');
    const bgInput = document.getElementById('bg-input');

    const dbName = 'RaveNewTabDB';
    const storeName = 'backgrounds';

    function getDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(storeName)) {
            db.createObjectStore(storeName);
          }
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function saveBackground(blob, type) {
      const db = await getDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readwrite');
        const store = transaction.objectStore(storeName);
        const request = store.put({ blob, type }, 'current');
        request.onsuccess = () => resolve();
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function getBackground() {
      const db = await getDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readonly');
        const store = transaction.objectStore(storeName);
        const request = store.get('current');
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    }

    async function removeBackground() {
      const db = await getDB();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readwrite');
        const store = transaction.objectStore(storeName);
        const request = store.delete('current');
        request.onsuccess = () => resolve();
        request.onerror = (e) => reject(e.target.error);
      });
    }

    let currentObjectUrl = null;

    async function loadCustomBg() {
      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = null;
      }

      try {
        const bgData = await getBackground();
        const videoEl = document.getElementById('bg-video');

        if (bgData && bgData.blob) {
          currentObjectUrl = URL.createObjectURL(bgData.blob);
          document.body.classList.add('has-custom-bg');
          btnRemoveBg.classList.remove('hidden');

          if (bgData.type === 'video') {
            document.body.classList.add('has-video-bg');
            document.body.style.backgroundImage = '';
            videoEl.src = currentObjectUrl;
            videoEl.play().catch(err => console.error("Error playing bg video:", err));
          } else {
            document.body.classList.remove('has-video-bg');
            videoEl.src = '';
            document.body.style.backgroundImage = `url("${currentObjectUrl}")`;
          }
        } else {
          // Migration from old localStorage base64 background to IndexedDB
          const oldBg = localStorage.getItem('rave-newtab-bg');
          if (oldBg) {
            try {
              const res = await fetch(oldBg);
              const blob = await res.blob();
              await saveBackground(blob, 'image');
              localStorage.removeItem('rave-newtab-bg');
              loadCustomBg();
              return;
            } catch (err) {
              console.error("Migration failed:", err);
              localStorage.removeItem('rave-newtab-bg');
            }
          }

          document.body.classList.remove('has-custom-bg');
          document.body.classList.remove('has-video-bg');
          document.body.style.backgroundImage = '';
          videoEl.src = '';
          btnRemoveBg.classList.add('hidden');
        }
      } catch (err) {
        console.error("Error loading custom background:", err);
      }
    }
    loadCustomBg();

    customizeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      customizeMenu.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!customizeMenu.contains(e.target) && e.target !== customizeBtn) {
        customizeMenu.classList.remove('open');
      }
    });

    btnUploadBg.addEventListener('click', () => {
      bgInput.click();
    });

    bgInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 100 * 1024 * 1024) {
        alert('El archivo seleccionado es demasiado grande. Por favor, elige uno menor a 100MB para un mejor rendimiento.');
        return;
      }

      const type = file.type.startsWith('video/') ? 'video' : 'image';

      try {
        await saveBackground(file, type);
        await loadCustomBg();
        customizeMenu.classList.remove('open');
      } catch (err) {
        console.error(err);
        alert('Ocurrió un error al guardar el archivo de fondo de pantalla.');
      }
    });

    btnRemoveBg.addEventListener('click', async () => {
      try {
        await removeBackground();
        await loadCustomBg();
        customizeMenu.classList.remove('open');
        bgInput.value = '';
      } catch (err) {
        console.error(err);
        alert('No se pudo quitar el fondo de pantalla.');
      }
    });

    /* ── Modal Atajos Logic ──────────────────────── */
    const shortcutModal = document.getElementById('shortcut-modal');
    const modalTitle = document.getElementById('modal-shortcut-title');
    const inputName = document.getElementById('shortcut-name');
    const inputUrl = document.getElementById('shortcut-url');
    const btnCancelShortcut = document.getElementById('btn-cancel-shortcut');
    const btnSaveShortcut = document.getElementById('btn-save-shortcut');
    
    let editIndex = -1;

    function openShortcutModal(index) {
      editIndex = index;
      const currentSites = getSitesList();
      if (index === -1) {
        modalTitle.textContent = 'Añadir atajo';
        inputName.value = '';
        inputUrl.value = '';
      } else {
        modalTitle.textContent = 'Editar atajo';
        inputName.value = currentSites[index].title;
        inputUrl.value = currentSites[index].url;
      }
      shortcutModal.classList.add('visible');
      inputName.focus();
    }

    function closeShortcutModal() {
      shortcutModal.classList.remove('visible');
    }

    btnCancelShortcut.addEventListener('click', closeShortcutModal);

    btnSaveShortcut.addEventListener('click', () => {
      const name = inputName.value.trim();
      let url = inputUrl.value.trim();

      if (!name || !url) {
        alert('Por favor, rellena todos los campos.');
        return;
      }

      if (!/^[a-z]+:\/\//i.test(url)) {
        url = 'https://' + url;
      }

      const currentSites = getSitesList();
      if (editIndex === -1) {
        currentSites.push({ title: name, url: url });
      } else {
        currentSites[editIndex] = { title: name, url: url };
      }

      localStorage.setItem('rave-custom-sites', JSON.stringify(currentSites));
      renderSites();
      closeShortcutModal();
    });

    function deleteShortcut(index) {
      const currentSites = getSitesList();
      if (confirm(`¿Estás seguro de que quieres eliminar el atajo a ${currentSites[index].title}?`)) {
        currentSites.splice(index, 1);
        localStorage.setItem('rave-custom-sites', JSON.stringify(currentSites));
        renderSites();
      }
    }

    // Reset shortcuts button (in customize menu)
    const btnResetShortcuts = document.getElementById('btn-reset-shortcuts');
    btnResetShortcuts.addEventListener('click', () => {
      if (confirm('¿Restablecer los accesos rápidos a los valores predeterminados (basados en tu historial)?')) {
        localStorage.removeItem('rave-custom-sites');
        renderSites();
        customizeMenu.classList.remove('open');
      }
    });
  </script>
</body>
</html>
