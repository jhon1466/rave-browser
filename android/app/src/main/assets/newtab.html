<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rave</title>
  <style>
    :root { --bg:#fff; --ink:#0a0a0a; --soft:#6b6b70; --border:#d8d8dc; --surface:#f4f4f5; }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#0d0d0f; --ink:#f5f5f5; --soft:#9a9aa0; --border:#2e2e33; --surface:#161618; }
    }
    [data-theme="dark"]{ --bg:#0d0d0f; --ink:#f5f5f5; --soft:#9a9aa0; --border:#2e2e33; --surface:#161618; }
    [data-theme="light"]{ --bg:#fff; --ink:#0a0a0a; --soft:#6b6b70; --border:#d8d8dc; --surface:#f4f4f5; }
    [data-theme="eclipse"]{ --bg:#1a0f08; --ink:#f5e6d3; --soft:#c4a882; --border:#4d3020; --surface:#2a1810; }
    *{box-sizing:border-box;margin:0}
    html,body{min-height:100%;font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;
      background:var(--bg);color:var(--ink)}
    .wrap{width:88vw;max-width:560px;margin:0 auto;padding:12vh 0 40px;text-align:center}
    .clock{font-size:48px;font-weight:300;letter-spacing:-1px}
    .date{color:var(--soft);font-size:14px;margin:4px 0 24px}
    .logo{font-size:42px;font-weight:800;letter-spacing:-2px;margin-bottom:4px}
    .logo .dot{color:var(--soft)}
    .tag{color:var(--soft);font-size:13px;margin-bottom:24px}
    form{display:flex;margin-bottom:28px}
    input{flex:1;height:52px;padding:0 20px;font-size:16px;color:var(--ink);
      background:var(--surface);border:1px solid var(--border);border-radius:26px;outline:none}
    .sites{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .site{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;
      border-radius:12px;text-decoration:none;color:var(--ink);background:var(--surface);border:1px solid var(--border);
      font-size:12px;overflow:hidden}
    .site span{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .site-ic{width:32px;height:32px;border-radius:8px;background:var(--border);display:grid;place-items:center;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
    <div class="logo">Rave<span class="dot">.</span></div>
    <div class="tag">Minimalista · Privado · Sin anuncios</div>
    <form id="f">
      <input id="q" autofocus placeholder="Busca o escribe una dirección" />
    </form>
    <div class="sites" id="sites"></div>
  </div>
  <script>
    var p = new URLSearchParams(location.search);
    var theme = p.get('theme') || 'system';
    if (theme !== 'system') document.documentElement.setAttribute('data-theme', theme);

    var engines = {
      ddg: 'https://duckduckgo.com/?q=',
      google: 'https://www.google.com/search?q=',
      bing: 'https://www.bing.com/search?q=',
      brave: 'https://search.brave.com/search?q=',
      ecosia: 'https://www.ecosia.org/search?q='
    };
    var engine = engines[p.get('engine')] || engines.ddg;

    function tick(){
      var d = new Date();
      document.getElementById('clock').textContent = d.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
      document.getElementById('date').textContent = d.toLocaleDateString('es', {weekday:'long', day:'numeric', month:'long'});
    }
    tick(); setInterval(tick, 30000);

    var defaults = ['https://youtube.com','https://wikipedia.org','https://github.com','https://reddit.com'];
    var sites = (p.get('sites') || '').split(',').filter(Boolean).map(decodeURIComponent);
    if (!sites.length) sites = defaults;
    var box = document.getElementById('sites');
    sites.slice(0,8).forEach(function(u){
      var a = document.createElement('a');
      a.className = 'site'; a.href = u;
      var host = u.replace(/^https?:\/\//,'').split('/')[0];
      a.innerHTML = '<div class="site-ic">'+host[0].toUpperCase()+'</div><span>'+host+'</span>';
      box.appendChild(a);
    });

    document.getElementById('f').addEventListener('submit', function(e){
      e.preventDefault();
      var t = document.getElementById('q').value.trim();
      if(!t) return;
      if(/^[a-z]+:\/\//i.test(t)) location.href = t;
      else if(/^[^\s]+\.[^\s]+$/.test(t) && t.indexOf(' ')<0) location.href = 'https://'+t;
      else location.href = engine + encodeURIComponent(t);
    });
  </script>
</body>
</html>
